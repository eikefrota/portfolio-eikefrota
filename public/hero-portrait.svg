<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">EF portrait placeholder</title>
  <desc id="desc">Temporary monogram placeholder for Eike Frota portrait.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".04"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="920" cy="260" r="190" fill="#ffffff" opacity=".05"/>
  <circle cx="240" cy="930" r="220" fill="#ffffff" opacity=".04"/>
  <rect x="92" y="92" width="1016" height="1016" rx="72" fill="url(#glow)" stroke="#ffffff" stroke-opacity=".18" stroke-width="2"/>
  <text x="600" y="640" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="330" font-weight="700" letter-spacing="-20" text-anchor="middle">EF</text>
  <text x="600" y="760" fill="#ffffff" opacity=".52" font-family="Arial, Helvetica, sans-serif" font-size="44" letter-spacing="10" text-anchor="middle">PLACEHOLDER</text>
</svg>
